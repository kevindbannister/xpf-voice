<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recording Indicator</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
      }

      .indicator {
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 16px;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div class="indicator">🎙 Recording...</div>
  </body>
</html>
