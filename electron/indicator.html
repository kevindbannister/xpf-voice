<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recording Indicator</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
      }

      .indicator {
        background: rgba(0, 0, 0, 0.75);
        color: white;
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
        user-select: none;
        min-width: 140px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="indicator">
      <div id="indicator-text">🎙 Recording...</div>
    </div>

    <script>
      window.setIndicatorState = (text) => {
        const indicatorText = document.getElementById('indicator-text');
        if (indicatorText) {
          indicatorText.textContent = text;
        }
      };
    </script>
  </body>
</html>
