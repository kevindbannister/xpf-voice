<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XProFlow Voice Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
      }

      .app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .panel {
        width: min(720px, 100%);
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 24px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>XProFlow Voice Dashboard</h1>
        <p>
          The dashboard is now loading from a bundled local <code>index.html</code> so the main UI can open correctly in Electron.
        </p>
      </section>
    </main>
  </body>
</html>
